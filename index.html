<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengarahkan ke Aplikasi...</title>
    
    <!-- Meta Refresh: Mengalihkan dalam 0 detik -->
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbw_a68JkaPNXt5JDw-FZcV_HfWR6mOunvn2nenfsN3a7jGDU42Yl1TcpNsPxk_9xSelxA/exec?page=klinik">
    
    <!-- JavaScript Redirect: Sebagai cadangan dan agar lebih cepat -->
    <script>
        window.location.replace("https://script.google.com/macros/s/AKfycbw_a68JkaPNXt5JDw-FZcV_HfWR6mOunvn2nenfsN3a7jGDU42Yl1TcpNsPxk_9xSelxA/exec?page=klinik");
    </script>
    
    <!-- CSS untuk tampilan loading sederhana -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p>Sedang membuka halaman klinik...</p>
    <p style="font-size: 0.9em; color: #666;">
        Jika tidak dialihkan secara otomatis, <a href="https://script.google.com/macros/s/AKfycbw_a68JkaPNXt5JDw-FZcV_HfWR6mOunvn2nenfsN3a7jGDU42Yl1TcpNsPxk_9xSelxA/exec?page=klinik">klik di sini</a>.
    </p>
</body>
</html>
